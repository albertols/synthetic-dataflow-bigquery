name: 3 - Import synthetic DAG into Composer

# Substitutes build-time values into composer/synthetic_beam_bigquery.py and
# imports it into the env-specific Composer environment. See docs/CICD.md §5.
on:
  workflow_dispatch:
    inputs:
      project_version:
        type: string
        required: false
        description: "Project version to bind into the DAG (default: derive from packages/sdfb-beam/pyproject.toml)"
      servicenow-implementation-task:
        type: string
        required: false

env:
  REGION: "europe-west3"

permissions:
  id-token: write
  contents: read

jobs:
  sdlc-unlock-prod:
    if: ${{ github.ref == 'refs/heads/RELEASE_dbc_prd' }}
    uses: <SDLC_ORG>/sdlc-workflows/.github/workflows/sdlc_deployment_workflow.yml@main
    with:
      ITSK: ${{ inputs.servicenow-implementation-task }}
      ENVIRONMENT: PRD
      GOOGLE_DEPLOYMENT_SERVICE_ACCOUNT: "<PROD_DEPLOY_SA>"
      DEPLOYMENT_TYPE: COMPOSER
    secrets:
      GOOGLE_PIPELINE_SERVICE_ACCOUNT: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)['prd/sdlc-ro-sa'] }}

  import:
    needs: [sdlc-unlock-prod]
    if: ${{ always() && (needs.sdlc-unlock-prod.result == 'skipped' || needs.sdlc-unlock-prod.result == 'success') }}
    runs-on:
      group: >-
        ${{
          github.ref_name == 'RELEASE_dbc_dev' && 'DEV' ||
          github.ref_name == 'RELEASE_dbc_uat' && 'UAT' ||
          github.ref_name == 'RELEASE_dbc_prd' && 'PRD' ||
          'DEV'
        }}
      labels:
        - <RUNNER_LABEL>
    steps:
      - uses: actions/checkout@v5

      - name: Map branch → env
        id: env
        run: |
          case "${GITHUB_REF##*/}" in
            RELEASE_dbc_dev) ENV_NAME=dev; SERVICE_ACCOUNT_STRING=dev/lz-deploy ;;
            RELEASE_dbc_uat) ENV_NAME=uat; SERVICE_ACCOUNT_STRING=uat/lz-deploy ;;
            RELEASE_dbc_prd) ENV_NAME=prd; SERVICE_ACCOUNT_STRING=prd/lz-deploy ;;
            *)               ENV_NAME=dev; SERVICE_ACCOUNT_STRING=dev/lz-deploy ;;
          esac
          GOOGLE_PROJECT_DBC="${{ secrets[format('GOOGLE_PROJECT_DBC_{0}', '$ENV_NAME')] }}"
          {
            echo "ENV_NAME=$ENV_NAME"
            echo "GOOGLE_PROJECT_DBC=$GOOGLE_PROJECT_DBC"
            echo "SERVICE_ACCOUNT_STRING=$SERVICE_ACCOUNT_STRING"
          } >> $GITHUB_OUTPUT

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.env.outputs.SERVICE_ACCOUNT_STRING] }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Resolve PROJECT_VERSION + DAG_VERSION
        run: |
          if [[ -n "${{ inputs.project_version }}" ]]; then
            VER="${{ inputs.project_version }}"
          else
            VER=$(grep -m1 '^version' packages/sdfb-beam/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          DAG_VERSION="${VER}_$(date +'%Y_%m_%d_%H_%M')"
          echo "PROJECT_VERSION=$VER"          >> $GITHUB_ENV
          echo "DAG_VERSION=$DAG_VERSION"      >> $GITHUB_ENV

      - name: Substitute build-time placeholders
        env:
          ENV_NAME: ${{ steps.env.outputs.ENV_NAME }}
        run: |
          sed -i \
            -e "s/{{PROJECT_VERSION}}/${PROJECT_VERSION}/g" \
            -e "s/{{DAG_VERSION}}/${DAG_VERSION}/g" \
            -e "s/{{ENV}}/${ENV_NAME}/g" \
            composer/synthetic_beam_bigquery.py
          echo "--- substituted DAG (first 30 lines) ---"
          head -30 composer/synthetic_beam_bigquery.py

      - name: Import into Composer
        env:
          PROJECT_ID: ${{ steps.env.outputs.GOOGLE_PROJECT_DBC }}
          ENV_NAME: ${{ steps.env.outputs.ENV_NAME }}
        run: |
          gcloud composer environments storage dags import \
            --project="${PROJECT_ID}" \
            --environment="<COMPOSER_NAME_PREFIX>-${ENV_NAME}-<TEAM>-composerv2-${REGION}" \
            --location="${REGION}" \
            --source=composer/synthetic_beam_bigquery.py
