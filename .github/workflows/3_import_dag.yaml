name: 3 - DB Import synthetic DAG into Composer

# Substitutes build-time values into composer/synthetic_beam_bigquery.py and
# imports it into the per-env Composer environment.


run-name: >-
  ${{ github.workflow }} |
  ${{ inputs.BUILD_TYPE }} |
  ${{ inputs.project_version || 'auto' }}

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: "Build Type (must match workflow 2)"
        type: choice
        options: [Development, Release]
        default: Development
      project_version:
        type: string
        description: "Override version/tag (default: auto-derived same as workflow 2)"
        required: false
      model_uri:
        type: string
        description: "GCS URI to the model weights (e.g. gs://the-gcs-bucket/synthetic/models/gemma4/e4b-it/v1)"
        required: true
        default: "gs://the-gcs-bucket/synthetic/models/gemma4/e4b-it/v1"
      embedder_uri:
        type: string
        description: "GCS URI to the B.1 RAG embedder (empty ⇒ HashingEmbedder)"
        required: false
        default: "gs://the-gcs-bucket/synthetic/models/embedders/bge-small-en-v1.5/v1"
      default_table_fqn:
        type: string
        description: "Default BigQuery table FQN (the-dev-project.synthetic_data.default_table)"
        required: true
        default: "the-dev-project.synthetic_data.default_table"
      ddl_uri:
        type: string
        description: "GCS URI to the DDL JSON (e.g. gs://…/ddl.json)"
        required: true
        default: "gs://the-gcs-bucket/synthetic/ddls/ddl_metadata_CDH_dataset_KW860T_RR.json"
      landing_table:
        type: string
        description: "Landing BigQuery table (the-dev-project.synthetic_data.sdfb_landing)"
        required: true
        default: "the-dev-project.synthetic_data.sdfb_landing"
      dlq_table:
        type: string
        description: "DLQ BigQuery table (the-dev-project.synthetic_data.sdfb_dlq)"
        required: true
        default: "the-dev-project.synthetic_data.sdfb_dlq"
      servicenow-implementation-task:
        type: string
        description: "ITSK/CHG Number (required only for production)"
        required: false

env:
  REGION: "europe-west3"
  PROJECT_BUCKET_SUFFIX: "the-project-bucket"

permissions:
  id-token: write
  contents: read

jobs:
  import:
    name: "Import DAG"
    runs-on:
      group: >-
        ${{
          github.ref_name == 'RELEASE_dbc_dev' && 'DEV' ||
          github.ref_name == 'RELEASE_dbc_uat' && 'UAT' ||
          github.ref_name == 'RELEASE_dbc_prd' && 'PRD' ||
          'DEV'
        }}

    environment: >-
      ${{
        github.ref_name == 'RELEASE_dbc_dev' && 'dev' ||
        github.ref_name == 'RELEASE_dbc_uat' && 'uat' ||
        github.ref_name == 'RELEASE_dbc_prd' && 'prd' ||
        'dev'
      }}

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6.0.2

      - id: environment
        name: "Set project and credentials"
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -e
          if [[ ${BRANCH_NAME} == RELEASE_dbc_prd ]]; then
            echo "ENV_NAME=prd"                                              >> $GITHUB_ENV
            echo "PROJECT_ID=the-prd-project"                        >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_PRD }}"  >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=prd/sdlc-ro-sa"                     >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=prd/lz-deploy"               >> $GITHUB_OUTPUT
          elif [[ ${BRANCH_NAME} == RELEASE_dbc_uat ]]; then
            echo "ENV_NAME=uat"                                              >> $GITHUB_ENV
            echo "PROJECT_ID=the-uat-project"                        >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_UAT }}"  >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=uat/lz-deploy"                      >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=uat/lz-deploy"               >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=dev"                                              >> $GITHUB_ENV
            echo "PROJECT_ID=the-dev-project"                        >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_DEV }}"  >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=dev/lz-deploy"                      >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=dev/lz-deploy"               >> $GITHUB_OUTPUT
          fi

      - name: "Authenticate to Google Cloud for secrets - ${{ env.ENV_NAME }}"
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.SERVICE_ACCOUNT_STRING] }}

      - id: get-secrets
        name: "Get secret"
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            artifactory_developer_username:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_DEVELOPER_USERNAME
            artifactory_developer_password:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_DEVELOPER_PASSWORD
            artifactory_release_username:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_USERNAME
            artifactory_release_password:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_PASSWORD

      # PRD only: switch from read-only secrets SA to the deploy SA before
      # the import call (mirrors pe-btr-producer-scala-beam import_DAG.yml).
      - name: "Authenticate to Google Cloud for import - ${{ env.ENV_NAME }}"
        if: env.ENV_NAME == 'prd'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.DEPLOY_SERVICE_ACCOUNT_STRING] }}

      - name: "Set up Cloud SDK"
        uses: google-github-actions/setup-gcloud@v3

      - name: "Resolve PROJECT_VERSION + DAG_VERSION"
        run: |
          if [[ -n "${{ inputs.project_version }}" ]]; then
            VER="${{ inputs.project_version }}"
          elif [[ "${{ inputs.BUILD_TYPE }}" == "Release" ]]; then
            # Release: use pyproject.toml version (same as workflows 1 & 2).
            VER=$(grep -m1 '^version' packages/sdfb-beam/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          else
            # Development: derive branch-sha tag (same as workflows 1 & 2).
            replaceSlashWithDash(){ echo "$1" | sed -r 's/\//-/g'; }
            VER="$(replaceSlashWithDash "${GITHUB_REF#refs/*/}")-$(git rev-parse --short HEAD)"
          fi

          if [[ -z "$VER" ]]; then
            echo "ERROR: PROJECT_VERSION is empty."
            exit 1
          fi

          DAG_VERSION="${VER}_$(date +'%Y_%m_%d_%H_%M')"
          echo "PROJECT_VERSION=$VER"     >> $GITHUB_ENV
          echo "DAG_VERSION=$DAG_VERSION" >> $GITHUB_ENV
          echo "Resolved: PROJECT_VERSION=$VER, DAG_VERSION=$DAG_VERSION"

      - name: "Substitute build-time placeholders"
        run: |
          # The DAG is a template: every {{MARKER}} is sed-substituted here at
          # import. GCS bucket names are derived from env; SDFB_* values come
          # from the workflow_dispatch inputs. Operational knobs (table_fqn,
          # num_rows, engine, batch_size, similarity) stay as runtime Airflow
          # {{ params.* }}, and infra (PROJECT_ID / REGION / DATAFLOW_SUBNET /
          # SA_DATAFLOW) stays as Composer Variables — both changeable without
          # re-importing the DAG.
          GCS_STAGING="db-${ENV_NAME}-${PROJECT_BUCKET_SUFFIX}-dataflow-staging"
          GCS_TEMPLATES="the-gcs-template-path"
          sed -i \
            -e "s|{{PROJECT_VERSION}}|${PROJECT_VERSION}|g" \
            -e "s|{{DAG_VERSION}}|${DAG_VERSION}|g" \
            -e "s|{{ENV}}|${ENV_NAME}|g" \
            -e "s|{{GCS_DATAFLOW_STAGING}}|${GCS_STAGING}|g" \
            -e "s|{{GCS_DATAFLOW_TEMPLATES}}|${GCS_TEMPLATES}|g" \
            -e "s|{{SDFB_MODEL_URI}}|${{ inputs.model_uri }}|g" \
            -e "s|{{SDFB_EMBEDDER_URI}}|${{ inputs.embedder_uri }}|g" \
            -e "s|{{SDFB_DEFAULT_TABLE_FQN}}|${{ inputs.default_table_fqn }}|g" \
            -e "s|{{SDFB_DDL_URI}}|${{ inputs.ddl_uri }}|g" \
            -e "s|{{SDFB_LANDING_TABLE}}|${{ inputs.landing_table }}|g" \
            -e "s|{{SDFB_DLQ_TABLE}}|${{ inputs.dlq_table }}|g" \
            composer/synthetic_beam_bigquery.py
          echo "--- substituted DAG (first 75 lines) ---"
          head -75 composer/synthetic_beam_bigquery.py

      - name: "Import DAG into Composer"
        run: |
          gcloud composer environments storage dags import \
            --project="${PROJECT_ID}" \
            --environment="db-${ENV_NAME}-pwcclake-es-composerv2-${REGION}" \
            --location="${REGION}" \
            --source=composer/synthetic_beam_bigquery.py
