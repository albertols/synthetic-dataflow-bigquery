name: 1 - DB Python Beam Build

# Replaces the placeholder-laden 1_build_python_beam.yaml. The Dockerfile and
# uv approach are kept; see docs/CICD.md + docker/Dockerfile.

run-name: >-
  ${{ github.workflow }} |
  ${{ inputs.BUILD_TYPE }} |
  push=${{ inputs.push_to_artifactory }}

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: "Build Type"
        type: choice
        options: [Development, Release]
        default: Development
      push_to_artifactory:
        description: "Also push the sdfb_beam wheel to JFrog pypi"
        type: boolean
        default: false

env:
  ARTIFACTORY_NAMESPACE: "com/db/pwcclakees"
  ARTIFACTORY_HOSTNAME: "the_artifactory"
  ARTIFACTORY_BASE_URL: "https://the_artifactory"
  IMAGE_NAME: "sdfb-python"
  PROJECT_BUCKET_SUFFIX: "the_project_bucket"
  PYTHON_VERSION: "3.11"
  BUILD_TYPE: ${{ inputs.BUILD_TYPE || 'Development' }}
  # The built image is pushed to BOTH registries: JFrog dkr-public-local
  # (archival/registry-of-record, immutable :<branch>-<sha>) AND Artifact Registry.
  # The Dataflow WORKER and the Flex Template launcher both pull from AR ONLY:
  # workers pull the SDK-harness container via kubelet with NO imagePullSecret, so
  # a 3rd-party JFrog pull 403s — only GCR/AR (worker SA IAM) works (ADR 0015). So
  # the baked sdk_container_image AND workflow 2's --image stay on the AR coordinate;
  # the JFrog copy is an additional artifact store, not a pull source at runtime.
  # AR_PROJECT_ID is per-env (APP_PROJECT_ID, the app project); AR_REPO is the
  # Terraform-created Docker repo.
  AR_LOCATION: "europe-west3"
  AR_REPO: "sdfb-dataflow"

permissions:
  id-token: write
  contents: read

jobs:

  build:
    name: "Python Beam Build"
    runs-on:
      group: >-
        ${{
          github.ref_name == 'RELEASE_dbc_dev' && 'DEV' ||
          github.ref_name == 'RELEASE_dbc_uat' && 'UAT' ||
          github.ref_name == 'RELEASE_dbc_prd' && 'PRD' ||
          'DEV'
        }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: environment
        name: "Set project and credentials"
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -e
          # GOOGLE_PROJECT_DBC = landing-zone/CI project (ARTIFACTORY_* secret
          # master). APP_PROJECT_ID = the runtime app project (mirrors workflow 3's
          # PROJECT_ID); used as the Artifact Registry project for the worker-image
          # mirror (ADR 0015).
          if [[ ${BRANCH_NAME} == RELEASE_dbc_prd ]]; then
            echo "ENV_NAME=prd"                                              >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_PRD }}"  >> $GITHUB_OUTPUT
            echo "APP_PROJECT_ID=the-prd-project"                            >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=prd/sdlc-ro-sa"                     >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=prd/lz-deploy"               >> $GITHUB_OUTPUT
          elif [[ ${BRANCH_NAME} == RELEASE_dbc_uat ]]; then
            echo "ENV_NAME=uat"                                              >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_UAT }}"  >> $GITHUB_OUTPUT
            echo "APP_PROJECT_ID=the-uat-project"                            >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=uat/lz-deploy"                      >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=uat/lz-deploy"               >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=dev"                                              >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_DEV }}"  >> $GITHUB_OUTPUT
            echo "APP_PROJECT_ID=the-dev-project"                            >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=dev/lz-deploy"                      >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=dev/lz-deploy"               >> $GITHUB_OUTPUT
          fi

      - name: "Authenticate to Google Cloud for secrets - ${{ env.ENV_NAME }}"
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.SERVICE_ACCOUNT_STRING] }}

      - id: get-secrets
        name: "Get secret"
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            artifactory_release_username:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_USERNAME
            artifactory_release_password:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_PASSWORD

      # PRD only: switch from read-only secrets SA to the deploy SA before
      # docker push (mirrors pe-btr-producer-scala-beam build.yaml lines 149-154).
      - name: "Authenticate to Google Cloud for build - ${{ env.ENV_NAME }}"
        if: env.ENV_NAME == 'prd'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.DEPLOY_SERVICE_ACCOUNT_STRING] }}

      - name: "Set up Cloud SDK"
        uses: google-github-actions/setup-gcloud@v3

      - name: "Install uv"
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Sync workspace (no dev tools, no GPU — GPU deps live only in the Docker image)"
        run: uv sync --frozen --no-dev --all-packages

      - name: "Sanity gate — laptop-side tests"
        # Rejects broken code before the slow docker build runs.
        run: uv run pytest -m "not gpu and not gcp" -q

      - name: "Set PROJECT_VERSION"
        run: |
          VER=$(uv run python -c "import importlib.metadata as m; print(m.version('sdfb-beam'))")
          echo "PROJECT_VERSION=$VER" >> $GITHUB_ENV

      - name: "Set RELEASE_VERSION"
        run: |
          replaceSlashWithDash(){ echo "$1" | sed -r 's/\//-/g'; }
          if [[ "${{ env.BUILD_TYPE }}" == "Release" ]]; then
            echo "RELEASE_VERSION=${{ env.PROJECT_VERSION }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=$(replaceSlashWithDash "${GITHUB_REF#refs/*/}")-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          fi

      - name: "Build sdfb-beam wheel"
        run: uv build --package sdfb-beam --wheel --out-dir dist

      - name: "Build ${{ env.BUILD_TYPE }} image + push to JFrog for env: ${{ env.ENV_NAME }}"
        env:
          ARTIFACTORY_RELEASER_USERNAME: ${{ steps.get-secrets.outputs.artifactory_release_username }}
          ARTIFACTORY_RELEASER_PASSWORD: ${{ steps.get-secrets.outputs.artifactory_release_password }}
          AR_PROJECT_ID: ${{ steps.environment.outputs.APP_PROJECT_ID }}
        run: |-
          # Proxy bypass for the internal JFrog — the Beam SDK BASE image is PULLED
          # from JFrog during the build, and the built image is PUSHED there too
          # (mirrors scala build.yaml lines 191-196). The blank is scoped to THIS
          # step ON PURPOSE: it also cuts egress to GitHub/Google, which breaks the
          # gcloud WIF credential helper — so the Artifact Registry push lives in its
          # OWN step below (fresh shell, proxy intact). See that step's comment.
          export no_proxy="${no_proxy},${ARTIFACTORY_HOSTNAME}"
          export NO_PROXY="${NO_PROXY},${ARTIFACTORY_HOSTNAME}"
          export HTTPS_PROXY="" https_proxy="" HTTP_PROXY="" http_proxy=""

          AR_IMG="${AR_LOCATION}-docker.pkg.dev/${AR_PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}"
          JFROG_IMG="${ARTIFACTORY_HOSTNAME}/dkr-public-local/${ARTIFACTORY_NAMESPACE}/${IMAGE_NAME}"

          # JFrog login: pulls the Beam SDK base image during the build (Dockerfile
          # FROM …/dkr-public-local/dkr-io/apache/beam…) AND authenticates the JFrog
          # push below. dkr-public-local is write-once: only ever push a fresh
          # immutable :<branch>-<sha> tag, never :latest (project memory / ADR 0003).
          echo "Logging into JFrog (base-image pull + image push)"
          echo "${ARTIFACTORY_RELEASER_PASSWORD}" | docker login --password-stdin \
              --username "${ARTIFACTORY_RELEASER_USERNAME}" "${ARTIFACTORY_BASE_URL}/"

          # Flex launcher base defaults to gcr.io — if ARC runners cannot reach
          # gcr.io, uncomment the --build-arg LAUNCHER_IMAGE override below with the
          # JFrog-mirrored path (see ADR 0012). Tag the SAME build for BOTH registries
          # (AR push happens in the next step). The baked SDFB_SDK_CONTAINER_IMAGE_ARG
          # stays the AR coordinate: the Dataflow worker can ONLY pull via
          # kubelet+worker-SA IAM (AR), never a 3rd-party JFrog registry (ADR 0015) —
          # so AR, not JFrog, is the runtime pull source for both worker and launcher.
          # --cache-from points at JFrog: it is the only registry reachable here (the
          # proxy is blanked, so AR is unreachable in this step).
          DOCKER_BUILDKIT=1 docker build \
            --platform=linux/amd64 \
            -f docker/Dockerfile \
            -t "$AR_IMG:$RELEASE_VERSION" \
            -t "$JFROG_IMG:$RELEASE_VERSION" \
            --cache-from "$JFROG_IMG:$RELEASE_VERSION" \
            --build-arg ENV_NAME_ARG=$ENV_NAME \
            --build-arg ARTIFACTORY_HOSTNAME_ARG=$ARTIFACTORY_HOSTNAME \
            --build-arg ARTIFACTORY_RELEASER_USERNAME_ARG=$ARTIFACTORY_RELEASER_USERNAME \
            --build-arg ARTIFACTORY_RELEASER_PWD_ARG=$ARTIFACTORY_RELEASER_PASSWORD \
            --build-arg SDFB_SDK_CONTAINER_IMAGE_ARG=$AR_IMG:$RELEASE_VERSION \
            .
            # --build-arg LAUNCHER_IMAGE=$ARTIFACTORY_HOSTNAME/<mirror>/dataflow-templates-base/python311-template-launcher-base \

          docker images | head -20

          # Push to JFrog (write-once, versioned :<branch>-<sha>, never :latest).
          # Prereq: JFrog releaser creds have write to dkr-public-local.
          echo "Pushing → ${JFROG_IMG}:${RELEASE_VERSION}"
          docker push "${JFROG_IMG}:${RELEASE_VERSION}"

      - name: "Push worker/launcher image to Artifact Registry - ${{ env.ENV_NAME }}"
        env:
          AR_PROJECT_ID: ${{ steps.environment.outputs.APP_PROJECT_ID }}
        run: |-
          # SEPARATE step ON PURPOSE. The build step above blanks HTTPS_PROXY to
          # bypass the corporate proxy for the internal JFrog. That same blank also
          # cuts egress to GitHub/Google, which breaks `docker push` to AR: its
          # docker-credential-gcloud helper re-mints the push token via Workload
          # Identity Federation — it must reach the GitHub OIDC endpoint AND Google
          # STS THROUGH the corporate proxy. Under the blanked proxy that refresh
          # timed out ("gcloud.auth.docker-helper … connect timeout …
          # githubusercontent.com"). A fresh step inherits the runner's default
          # proxy, so WIF egress works and the AR push succeeds.
          AR_IMG="${AR_LOCATION}-docker.pkg.dev/${AR_PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}"

          echo "== gcloud identity (post-WIF auth) =="
          gcloud auth list --format="table(account,status)" || true
          echo "Active project: $(gcloud config get-value project 2>/dev/null || true)"

          echo "== Configuring docker credHelper for ${AR_LOCATION}-docker.pkg.dev =="
          gcloud auth configure-docker "${AR_LOCATION}-docker.pkg.dev" --quiet

          # Prereqs (one-time, Terraform/IAM):
          #   - AR Docker repo ${AR_REPO} in ${AR_PROJECT_ID}/${AR_LOCATION}
          #   - this CI SA: roles/artifactregistry.writer on ${AR_REPO}
          #   - dataflow-sa-controller@<app>: roles/artifactregistry.reader (launcher + worker)
          echo "Pushing → ${AR_IMG}:${RELEASE_VERSION}"
          docker push "${AR_IMG}:${RELEASE_VERSION}"

      - name: "Push wheel to JFrog pypi (optional)"
        if: ${{ inputs.push_to_artifactory }}
        uses: the-gh-scace/sdlc-workflows/.github/actions/push-to-artifactory@main
        with:
          artifact_path: dist/sdfb_beam-${{ env.PROJECT_VERSION }}-py3-none-any.whl
          artifactory_repository: "pypi-all/${{ env.ARTIFACTORY_NAMESPACE }}/sdfb-beam/${{ env.PROJECT_VERSION }}"
          default_wif_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          wif_service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.SERVICE_ACCOUNT_STRING] }}
          secrets_project: ${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}
