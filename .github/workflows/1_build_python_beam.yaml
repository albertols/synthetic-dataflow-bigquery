name: 1 - Build Python Beam image

# PRD-ready CICD for the Python Beam Flex Template image.
# Mirrors the bank's Scala/PySpark patterns (WIF + GSM + sdlc-unlock-prod
# + ARC self-hosted runners + JFrog as registry).
#
# Locked decisions: docs/CICD.md + docs/adr/0008-ci-driven-builds.md.
#
# Placeholders below MUST be filled in when this workflow is mirrored to the
# bank-internal repository:
#   <RUNNER_LABEL>            ARC runner pool label
#   <SDLC_ORG>                Internal GitHub org hosting sdlc-workflows
#   <ARTIFACTORY_HOSTNAME>    Corporate JFrog hostname
#   <ARTIFACTORY_NAMESPACE>   Image namespace (e.g. com/<org>/<team>)
#   <BUCKET_PREFIX>           Bucket name prefix (e.g. <orgcode>-<env>-<region>)
#   <PROJECT_BUCKET_SUFFIX>   Bucket name suffix template
#   <PROD_DEPLOY_SA>          Service account used for PRD deploy gate
on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        type: choice
        options: [Development, Release]
        default: Development
      push_to_artifactory:
        type: boolean
        default: false
        description: "Also push the sdfb_beam wheel to JFrog pypi"
      servicenow-implementation-task:
        type: string
        required: false
        description: "ITSK for the PRD SDLC unlock (ignored on DEV/UAT)"

env:
  ARTIFACTORY_HOSTNAME: "<ARTIFACTORY_HOSTNAME>"
  ARTIFACTORY_NAMESPACE: "<ARTIFACTORY_NAMESPACE>"
  IMAGE_NAME: "sdfb-python"
  PROJECT_BUCKET_SUFFIX: "<PROJECT_BUCKET_SUFFIX>"
  REGION: "europe-west3"
  PYTHON_VERSION: "3.11"

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # PRD gate via the bank's reusable SDLC workflow. Skipped on DEV/UAT.
  # ---------------------------------------------------------------------------
  sdlc-unlock-prod:
    if: ${{ github.ref == 'refs/heads/RELEASE_dbc_prd' }}
    uses: <SDLC_ORG>/sdlc-workflows/.github/workflows/sdlc_deployment_workflow.yml@main
    with:
      ITSK: ${{ inputs.servicenow-implementation-task }}
      ENVIRONMENT: PRD
      GOOGLE_DEPLOYMENT_SERVICE_ACCOUNT: "<PROD_DEPLOY_SA>"
      DEPLOYMENT_TYPE: DATAFLOW
    secrets:
      GOOGLE_PIPELINE_SERVICE_ACCOUNT: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)['prd/sdlc-ro-sa'] }}

  build:
    needs: [sdlc-unlock-prod]
    if: ${{ always() && (needs.sdlc-unlock-prod.result == 'skipped' || needs.sdlc-unlock-prod.result == 'success') }}
    runs-on:
      group: >-
        ${{
          github.ref_name == 'RELEASE_dbc_dev' && 'DEV' ||
          github.ref_name == 'RELEASE_dbc_uat' && 'UAT' ||
          github.ref_name == 'RELEASE_dbc_prd' && 'PRD' ||
          'DEV'
        }}
      labels:
        - <RUNNER_LABEL>
    steps:
      - uses: actions/checkout@v5

      - name: Map branch → env
        id: env
        run: |
          case "${GITHUB_REF##*/}" in
            RELEASE_dbc_dev) ENV_NAME=dev; SERVICE_ACCOUNT_STRING=dev/lz-deploy ;;
            RELEASE_dbc_uat) ENV_NAME=uat; SERVICE_ACCOUNT_STRING=uat/lz-deploy ;;
            RELEASE_dbc_prd) ENV_NAME=prd; SERVICE_ACCOUNT_STRING=prd/lz-deploy ;;
            *)               ENV_NAME=dev; SERVICE_ACCOUNT_STRING=dev/lz-deploy ;;
          esac
          echo "ENV_NAME=$ENV_NAME"                                 >> $GITHUB_OUTPUT
          echo "SERVICE_ACCOUNT_STRING=$SERVICE_ACCOUNT_STRING"     >> $GITHUB_OUTPUT
          GOOGLE_PROJECT_DBC="${{ secrets[format('GOOGLE_PROJECT_DBC_{0}', '$ENV_NAME')] }}"
          echo "GOOGLE_PROJECT_DBC=$GOOGLE_PROJECT_DBC"             >> $GITHUB_OUTPUT
          echo "ENV_NAME=$ENV_NAME"                                 >> $GITHUB_ENV

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.env.outputs.SERVICE_ACCOUNT_STRING] }}

      - uses: google-github-actions/setup-gcloud@v3

      - id: get-secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            artifactory_developer_username:${{ steps.env.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_DEVELOPER_USERNAME
            artifactory_developer_password:${{ steps.env.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_DEVELOPER_PASSWORD
            artifactory_releaser_username:${{ steps.env.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_USERNAME
            artifactory_releaser_password:${{ steps.env.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_PASSWORD

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync workspace (with GPU/embedding/library extras, no dev tools)
        run: uv sync --frozen --no-dev --all-packages --extra gpu --extra embedding --extra library

      - name: Sanity gate — laptop-side tests
        # Rejects broken code before the slow docker build runs.
        run: uv run pytest -m "not gpu and not gcp" -q

      - name: Derive PROJECT_VERSION + RELEASE_VERSION
        run: |
          VER=$(uv run python -c "import importlib.metadata as m; print(m.version('sdfb-beam'))")
          echo "PROJECT_VERSION=$VER" >> $GITHUB_ENV
          if [[ "${{ inputs.BUILD_TYPE }}" == "Release" ]]; then
            echo "RELEASE_VERSION=$VER" >> $GITHUB_ENV
          else
            BR="${GITHUB_REF#refs/*/}"
            BR="${BR//\//-}"
            SHA=$(git rev-parse --short HEAD)
            echo "RELEASE_VERSION=${BR}-${SHA}" >> $GITHUB_ENV
          fi

      - name: Build sdfb-beam wheel
        run: uv build --package sdfb-beam --wheel --out-dir dist

      - name: Docker build & push
        env:
          ARTIFACTORY_RELEASER_USERNAME: ${{ steps.get-secrets.outputs.artifactory_releaser_username }}
          ARTIFACTORY_RELEASER_PASSWORD: ${{ steps.get-secrets.outputs.artifactory_releaser_password }}
        run: |
          IMG="$ARTIFACTORY_HOSTNAME/dkr-public-local/$ARTIFACTORY_NAMESPACE/$IMAGE_NAME"
          echo "$ARTIFACTORY_RELEASER_PASSWORD" | docker login --password-stdin \
              --username "$ARTIFACTORY_RELEASER_USERNAME" "$ARTIFACTORY_HOSTNAME/"
          DOCKER_BUILDKIT=1 docker build \
            --platform=linux/amd64 \
            -f docker/Dockerfile \
            -t "$IMG:$RELEASE_VERSION" \
            -t "$IMG:latest" \
            --cache-from "$IMG:latest" \
            --build-arg ENV_NAME_ARG=$ENV_NAME \
            --build-arg ARTIFACTORY_HOSTNAME_ARG=$ARTIFACTORY_HOSTNAME \
            --build-arg ARTIFACTORY_RELEASER_USERNAME_ARG=$ARTIFACTORY_RELEASER_USERNAME \
            --build-arg ARTIFACTORY_RELEASER_PWD_ARG=$ARTIFACTORY_RELEASER_PASSWORD \
            .
          docker push "$IMG:$RELEASE_VERSION"
          docker push "$IMG:latest"

      - name: Upload wheel + config to GCS
        run: |
          BKT="<BUCKET_PREFIX>-${ENV_NAME}-${PROJECT_BUCKET_SUFFIX}-synthetic"
          gsutil cp "dist/sdfb_beam-${PROJECT_VERSION}-py3-none-any.whl" "gs://$BKT/sdfb/${PROJECT_VERSION}/"
          gsutil -m rsync -r -d config/ "gs://$BKT/sdfb/${PROJECT_VERSION}/config/"

      - name: Push wheel to JFrog pypi (optional)
        if: ${{ inputs.push_to_artifactory }}
        uses: <SDLC_ORG>/sdlc-workflows/.github/actions/push-to-artifactory@main
        with:
          artifact_path: dist/sdfb_beam-${{ env.PROJECT_VERSION }}-py3-none-any.whl
          artifactory_repository: "pypi-all/${{ env.ARTIFACTORY_NAMESPACE }}/sdfb-beam/${{ env.PROJECT_VERSION }}"
          default_wif_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          wif_service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.env.outputs.SERVICE_ACCOUNT_STRING] }}
          secrets_project: ${{ steps.env.outputs.GOOGLE_PROJECT_DBC }}
