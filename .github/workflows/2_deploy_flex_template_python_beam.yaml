name: 2 - DB Deploy Python Beam Flex Template

# Publishes the Flex Template JSON pointing at an existing sdfb-python image
# (built by workflow 1_db_build_python_beam.yaml) and rsyncs the runtime
# config/ directory to the per-version GCS location the DAG reads from.
#

run-name: >-
  ${{ github.workflow }} |
  ${{ inputs.BUILD_TYPE }}

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        type: choice
        options: [Development, Release]
        default: Development
      override_image_tag:
        type: string
        required: false
        description: "Pin a specific image tag (default: derived from BUILD_TYPE + branch)"
      servicenow-implementation-task:
        type: string
        required: false

env:
  ARTIFACTORY_HOSTNAME: "<ARTIFACTORY_HOSTNAME>"
  ARTIFACTORY_NAMESPACE: "<ARTIFACTORY_NAMESPACE>"
  IMAGE_NAME: "sdfb-python"
  PROJECT_BUCKET_SUFFIX: "<PROJECT_BUCKET_SUFFIX>"
  REGION: "europe-west3"
  BUILD_TYPE: ${{ inputs.BUILD_TYPE || 'Development' }}

permissions:
  id-token: write
  contents: read

jobs:

  deploy:
    runs-on:
      group: >-
        ${{
          github.ref_name == 'RELEASE_dbc_dev' && 'DEV' ||
          github.ref_name == 'RELEASE_dbc_uat' && 'UAT' ||
          github.ref_name == 'RELEASE_dbc_prd' && 'PRD' ||
          'DEV'
        }}

    steps:
      - uses: actions/checkout@v6.0.2

      - id: environment
        name: "Set project and credentials"
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -e
          if [[ ${BRANCH_NAME} == RELEASE_dbc_prd ]]; then
            echo "ENV_NAME=prd"                                              >> $GITHUB_ENV
            echo "KEYS_PROJECT_ID=the_keys"                >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_PRD }}"  >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=prd/sdlc-ro-sa"                     >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=prd/lz-deploy"               >> $GITHUB_OUTPUT
          elif [[ ${BRANCH_NAME} == RELEASE_dbc_uat ]]; then
            echo "ENV_NAME=uat"                                              >> $GITHUB_ENV
            echo "KEYS_PROJECT_ID=the_keys"                >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_UAT }}"  >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=uat/lz-deploy"                      >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=uat/lz-deploy"               >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=dev"                                              >> $GITHUB_ENV
            echo "KEYS_PROJECT_ID=the_keys"                >> $GITHUB_ENV
            echo "GOOGLE_PROJECT_DBC=${{ secrets.GOOGLE_PROJECT_DBC_DEV }}"  >> $GITHUB_OUTPUT
            echo "SERVICE_ACCOUNT_STRING=dev/lz-deploy"                      >> $GITHUB_OUTPUT
            echo "DEPLOY_SERVICE_ACCOUNT_STRING=dev/lz-deploy"               >> $GITHUB_OUTPUT
          fi

      - name: "Authenticate to Google Cloud for secrets - ${{ env.ENV_NAME }}"
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.SERVICE_ACCOUNT_STRING] }}

      - id: get-secrets
        name: "Get secret"
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            artifactory_developer_username:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_DEVELOPER_USERNAME
            artifactory_developer_password:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_DEVELOPER_PASSWORD
            artifactory_releaser_username:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_USERNAME
            artifactory_releaser_password:${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}/ARTIFACTORY_RELEASER_PASSWORD

      - name: "Authenticate to Google Cloud for deploy - ${{ env.ENV_NAME }}"
        if: env.ENV_NAME == 'prd'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DEFAULT_WIF_PROVIDER }}
          service_account: ${{ fromJSON(secrets.PIPELINE_SERVICE_ACCOUNT_EMAILS)[steps.environment.outputs.DEPLOY_SERVICE_ACCOUNT_STRING] }}

      - name: "Set up Cloud SDK"
        uses: google-github-actions/setup-gcloud@v3

      - name: "Resolve RELEASE_VERSION"
        run: |
          replaceSlashWithDash(){ echo "$1" | sed -r 's/\//-/g'; }
          if [[ -n "${{ inputs.override_image_tag }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.override_image_tag }}" >> $GITHUB_ENV
          elif [[ "${{ env.BUILD_TYPE }}" == "Release" ]]; then
            VER=$(grep -m1 '^version' packages/sdfb-beam/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
            echo "RELEASE_VERSION=$VER" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=$(replaceSlashWithDash "${GITHUB_REF#refs/*/}")-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          fi

      - name: "Set DF_TEMPLATE_PATH"
        run: |
          echo "DF_TEMPLATE_PATH=gs://the-gcs-template-path/synthetic/sdfb-${RELEASE_VERSION}-template.json" >> $GITHUB_ENV

      - name: "Copy conf files to GCS"
        run: |
          gsutil -m rsync -r -d config/ "gs://the-gcs-bucket/synthetic/${RELEASE_VERSION}/"

      - name: "Build ${{ env.BUILD_TYPE }} flex-template for env: ${{ env.ENV_NAME }}"
        env:
          PROJECT_ID: ${{ steps.environment.outputs.GOOGLE_PROJECT_DBC }}
        run: |-
          IMG="${ARTIFACTORY_HOSTNAME}/dkr-public-local/${ARTIFACTORY_NAMESPACE}/${IMAGE_NAME}:${RELEASE_VERSION}"
          echo "Creating Dataflow Flex Template at: ${DF_TEMPLATE_PATH}"
          echo "Backing image: ${IMG}"

          gcloud dataflow flex-template build "${DF_TEMPLATE_PATH}" \
            --image="${IMG}" \
            --image-repository-username-secret-id="projects/${PROJECT_ID}/secrets/ARTIFACTORY_RELEASER_USERNAME" \
            --image-repository-password-secret-id="projects/${PROJECT_ID}/secrets/ARTIFACTORY_RELEASER_PASSWORD" \
            --sdk-language=PYTHON \
            --staging-location="gs://db-${ENV_NAME}-${PROJECT_BUCKET_SUFFIX}-dataflow-staging/staging" \
            --temp-location="gs://db-${ENV_NAME}-${PROJECT_BUCKET_SUFFIX}-dataflow-staging/temp" \
            --dataflow-kms-key="projects/${KEYS_PROJECT_ID}/locations/${REGION}/keyRings/a_crypto_key"
          echo "Template published: ${DF_TEMPLATE_PATH}"

      - name: "Publish stable sdfb-latest-template.json pointer (Development)"
        if: ${{ env.BUILD_TYPE == 'Development' }}
        run: |
          # The flex-template JSON is the indirection layer — it embeds the
          # immutable :<branch>-<sha> image. Copying it to a stable GCS name lets
          # workflow 3 / the DAG reference 'sdfb-latest-template.json' without
          # knowing the sha. GCS overwrite is allowed (unlike the immutable docker
          # repo), so 'latest' lives here, not as a docker tag.
          LATEST_PATH="gs://the-gcs-template-path/synthetic/sdfb-latest-template.json"
          gsutil cp "${DF_TEMPLATE_PATH}" "${LATEST_PATH}"
          echo "Stable pointer updated: ${LATEST_PATH} -> image :${RELEASE_VERSION}"