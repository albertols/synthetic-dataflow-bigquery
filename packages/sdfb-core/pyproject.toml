[project]
name = "sdfb-core"
version = "0.1.0"
description = "Pure-Python core for synthetic-dataflow-bigquery: contracts, codegen, engine ABC, prompt templates."
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }
readme = { content-type = "text/markdown", text = "Pure-Python core. No Beam, no GCP, no torch dependencies." }

dependencies = [
    "pydantic>=2.7,<3.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sdfb_core"]
