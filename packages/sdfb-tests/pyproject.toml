[project]
name = "sdfb-tests"
version = "0.1.0"
description = "Test suite (unit + DirectRunner integration) for synthetic-dataflow-bigquery."
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }
readme = { content-type = "text/markdown", text = "Tests. Helpers in src/sdfb_tests; pytest discovery rooted at tests/." }

dependencies = [
    "sdfb-core",
    "sdfb-beam",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "hypothesis>=6.100.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sdfb_tests"]
